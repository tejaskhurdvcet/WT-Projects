<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complex Calculator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="calculator card shadow-lg p-3">

        <div id="history" class="history text-end"></div>
        <input type="text" id="display" class="form-control display mb-3" disabled>

        <div class="row g-2">
            <button class="btn btn-danger col" onclick="clearDisplay()">C</button>
            <button class="btn btn-warning col" onclick="backspace()">⌫</button>
            <button class="btn btn-info col" onclick="append('%')">%</button>
            <button class="btn btn-primary col" onclick="append('/')">÷</button>

            <button class="btn btn-secondary col" onclick="scientific('sqrt')">√</button>
            <button class="btn btn-secondary col" onclick="scientific('square')">x²</button>
            <button class="btn btn-secondary col" onclick="scientific('sin')">sin</button>
            <button class="btn btn-primary col" onclick="append('*')">×</button>

            <button class="btn btn-light col" onclick="append('7')">7</button>
            <button class="btn btn-light col" onclick="append('8')">8</button>
            <button class="btn btn-light col" onclick="append('9')">9</button>
            <button class="btn btn-primary col" onclick="append('-')">−</button>

            <button class="btn btn-light col" onclick="append('4')">4</button>
            <button class="btn btn-light col" onclick="append('5')">5</button>
            <button class="btn btn-light col" onclick="append('6')">6</button>
            <button class="btn btn-primary col" onclick="append('+')">+</button>

            <button class="btn btn-light col" onclick="append('1')">1</button>
            <button class="btn btn-light col" onclick="append('2')">2</button>
            <button class="btn btn-light col" onclick="append('3')">3</button>
            <button class="btn btn-success col" rowspan="2" onclick="calculate()">=</button>

            <button class="btn btn-light col-6" onclick="append('0')">0</button>
            <button class="btn btn-light col" onclick="append('.')">.</button>
        </div>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
